<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<nav>
<div class="mainnav container flex">
    
    <a href="" class="brandname">Sam News</a>
    <div class="navlinks"><ul class="flex"> 
        <li class=" hoverlink navitem" id="ipl" onclick="onnavitemclick('ipl')">IPL</li>
        <li class="hoverlink navitem" id="finance" onclick="onnavitemclick ('finance')">Finance</li>
        <li class=" hoverlink navitem" id="politics" onclick="onnavitemclick('politics')">Politics</li>
        <li class="hoverlink navitem" id="science"onclick="onnavitemclick('science')">Science</li>
        <li class="hoverlink navitem" id="sports" onclick="onnavitemclick('sports')">Sports</li>
    </ul>
</div>

<div class="searchbar flex">
    <input type="text" class="newsinput" Placeholder="e.g. technology" id="searchtext">
    <button class="searchbtn" id="searchbtn">Search</button>
</div>
</div>
</nav>
    
<main>
    <div class="cards-container container flex" id="cards-container">
   
    </div>
</main>

<template id="template-news-card">
      <div class="card">
            <div class="cardheader">
                <img src="https://via.placeholder.com/400*200" alt="news image" id="news-img">
            </div>
            <div class="card-cntn">
                <h3 id="news-title">This is the title </h3>
                <h6 id="news-source" class="news source">End Gadget 5/16/2026</h6>
                <p class="news-decs" id="news-decs">Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga molestias commodi magni adipisci illo! Architecto nesciunt et quasi exercitationem commodi.</p>
            </div>
         </div>


</template>

    <script src="script.js" ></script>

</body>
</html>
